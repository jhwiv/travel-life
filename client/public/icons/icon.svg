<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#14B8A6"/>
      <stop offset="100%" stop-color="#1E3A5F"/>
    </linearGradient>
    <linearGradient id="arc" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#FBBF24"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Globe circle - bolder -->
  <circle cx="256" cy="268" r="150" fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="5"/>

  <!-- Globe longitude lines - bolder -->
  <ellipse cx="256" cy="268" rx="70" ry="150" fill="none" stroke="rgba(255,255,255,0.14)" stroke-width="3.5"/>
  <ellipse cx="256" cy="268" rx="125" ry="150" fill="none" stroke="rgba(255,255,255,0.10)" stroke-width="2.5"/>

  <!-- Globe latitude lines - bolder -->
  <ellipse cx="256" cy="218" rx="142" ry="26" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="2.5"/>
  <line x1="106" y1="268" x2="406" y2="268" stroke="rgba(255,255,255,0.16)" stroke-width="3.5"/>
  <ellipse cx="256" cy="318" rx="142" ry="26" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="2.5"/>

  <!-- Flight arc - bold solid stroke -->
  <path d="M 125 315 Q 250 90 415 225" fill="none" stroke="url(#arc)" stroke-width="7" stroke-linecap="round" opacity="0.95"/>

  <!-- Departure dot - larger -->
  <circle cx="125" cy="315" r="9" fill="#F59E0B" opacity="0.9"/>

  <!-- Airplane - larger, cleaner silhouette -->
  <g transform="translate(404, 230) rotate(-20)">
    <path d="M 12 0 L -8 0 L -18 -15 L -14 -15 L -5 -3 L -20 -3 L -24 -8 L -26 -8 L -23 -3 L -28 -3 L -28 3 L -23 3 L -26 8 L -24 8 L -20 3 L -5 3 L -14 15 L -18 15 L -8 0 Z" fill="white" opacity="0.95"/>
  </g>

  <!-- Arrival dot -->
  <circle cx="415" cy="225" r="6" fill="white" opacity="0.6"/>
</svg>
